<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      width: 350px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      text-align: center;
      padding: 30px 20px;
      position: relative;
    }

    .profile-img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid #4facfe;
      margin-top: -80px;
      background: white;
    }

    .name {
      font-size: 24px;
      font-weight: 700;
      margin: 15px 0 5px;
    }

    .role {
      color: #555;
      margin-bottom: 15px;
    }

    .bio {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    .info {
      text-align: left;
      font-size: 14px;
      margin: 10px 0;
    }

    .info span {
      font-weight: 500;
    }

    .buttons a {
      text-decoration: none;
      padding: 10px 15px;
      margin: 10px 5px;
      border-radius: 8px;
      color: white;
      display: inline-block;
      font-size: 14px;
    }

    .github {
      background: #333;
    }

    .linkedin {
      background: #0077b5;
    }

  </style>
</head>

<body>

<div class="card">

  <!-- YOUR PHOTO -->
  <img src="profile.png" class="profile-img" alt="My Photo">

  <div class="name">Loga Priya N</div>
  <div class="role">Web Developer</div>

  <div class="bio">
    Passionate web developer 💻 creating modern and user-friendly designs.
  </div>

  <div class="info"><span>Email:</span> logapriyatharani069-commits</div>
  <div class="info"><span>Phone:</span> +91 7092355670</div>
  <div class="info"><span>Location:</span> karur,india</div>

  <div class="buttons">
    <a href="https://github.com/logapriyatharani069-commits" class="github">GitHub</a>
    <a href="https://www.linkedin.com/in/loga-priya-n-74a" class="linkedin">LinkedIn</a>
  </div>

</div>

</body>
</html>
